# Introduction to YAML:     https://www.youtube.com/watch?v=cdLNKUoMc6c
# Chart config reference:   https://zero-to-jupyterhub.readthedocs.io/en/stable/resources/reference.html
# Chart default values:     https://github.com/jupyterhub/zero-to-jupyterhub-k8s/blob/HEAD/jupyterhub/values.yaml
# Available chart versions: https://jupyterhub.github.io/helm-chart/

jupyterhub:
  singleuser:
    defaultUrl: "/lab"
    startTimeout: 600
    image:
      name: ghcr.io/cal-itp/data-infra/jupyter-singleuser
      tag: 2026.3.18
    memory:
      # Much more than 10 and we risk bumping up against the actual capacity of e2-highmem-2
      limit: 10G
      # Very roughly I have seen most usage in the 2-3GB range
      guarantee: 3G
    storage:
      capacity: 32Gi
    cpu:
      # this is to put 2 pods per e2-highmem-2 which has 1.93 allocatable
      guarantee: 0.7
    lifecycleHooks:
      postStart:
        exec:
          command:
            - "sh"
            - "-c"
            - >
              cp /tmp/profile.sh /home/jovyan/.profile;
              mkdir -p -- /home/jovyan/.jupyter;
              cp /tmp/jupyter_notebook_config.py /home/jovyan/.jupyter/jupyter_notebook_config.py;
    profileList:
      - display_name: "Default Image - 2026.3.18, Python 3.11"
        description: "Thinned image with pyproject-local-kernel. Run `uv sync` in your project to install dependencies, then select the 'Pyproject Local' kernel in notebooks. See #1882."
        default: true
        kubespawner_override:
          image: ghcr.io/cal-itp/data-infra/jupyter-singleuser:2026.3.18
      - display_name: "Power Default Image - 2026.3.18, Python 3.11"
        description: "Thinned image with pyproject-local-kernel. Run `uv sync` in your project to install dependencies, then select the 'Pyproject Local' kernel in notebooks. Your code will run on a shared machine with 10–12G of memory and 1.5–1.9 CPU cores."
        kubespawner_override:
          mem_limit: "12G"
          mem_guarantee: "10G"
          cpu_guarantee: 1.5
          image: ghcr.io/cal-itp/data-infra/jupyter-singleuser:2026.3.18
      - display_name: "Legacy Image - 2026.2.6, Python 3.11"
        description: "Fat image with package management switched from Poetry to uv, dask[dataframe] installed, and calitp-data-analysis==2026.1.30. Your code will run on a shared machine with 3–10G of memory and 0.7–1.9 CPU cores."
        kubespawner_override:
          image: ghcr.io/cal-itp/data-infra/jupyter-singleuser:2026.2.6
      - display_name: "Power Legacy Image - 2026.2.6, Python 3.11"
        description: "Fat image with package management switched from Poetry to uv, dask[dataframe] installed, and calitp-data-analysis==2026.1.30. Your code will run on a shared machine with 10–12G of memory and 1.5–1.9 CPU cores."
        kubespawner_override:
          mem_limit: "12G"
          mem_guarantee: "10G"
          cpu_guarantee: 1.5
          image: ghcr.io/cal-itp/data-infra/jupyter-singleuser:2026.2.6
      - display_name: "Legacy Image - 2026.1.12, Python 3.11"
        description: "This is the previous default image version, siuba was removed and both SQLAlchemy and Pandas were upgraded to their respective v2 versions. Your code will run on a shared machine with 3–10G of memory and 0.7–1.9 CPU cores."
        kubespawner_override:
          image: ghcr.io/cal-itp/data-infra/jupyter-singleuser:2026.1.12
      - display_name: "Power Legacy Image - 2026.1.12, Python 3.11"
        description: "This is the previous default image version, siuba was removed and both SQLAlchemy and Pandas were upgraded to their respective v2 versions. Your code will run on a shared machine with 10–12G of memory and 1.5–1.9 CPU cores."
        kubespawner_override:
          mem_limit: "12G"
          mem_guarantee: "10G"
          cpu_guarantee: 1.5
          image: ghcr.io/cal-itp/data-infra/jupyter-singleuser:2026.1.12
  scheduling:
    userPods:
      nodeAffinity:
        matchNodePurpose: require
  hub:
    db:
      pvc:
        storage: 32Gi
    config:
      GitHubOAuthenticator:
        # client_id:     in existingSecret
        # client_secret: in existingSecret
        oauth_callback_url: https://jupyterhub.dds.dot.ca.gov/hub/oauth_callback
        allowed_organizations:
          - cal-itp:warehouse-users
        scope:
          - read:org
      JupyterHub:
        authenticator_class: github
        Authenticator:
          admin_users:
            - vevetron
            - tiffanychu90
            - themightychris
            - evansiroky
            - charlie-costanzo
            - raebot
        tornado_settings:
          headers:
            Content-Security-Policy: "frame-ancestors *"
      Spawner:
        args:
          - '--NotebookApp.tornado_settings={"headers":{"Content-Security-Policy": "frame-ancestors *"}}'
          - '--ContentsManager.allow_hidden=True'
    # holds github OAuth creds
    existingSecret: jupyterhub-github-config
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/permanent-redirect: https://jupyterhub.dds.dot.ca.gov$request_uri
    hosts:
      - notebooks.calitp.org
    tls:
      - secretName: jupyterhub-tls
        hosts:
          - notebooks.calitp.org
  proxy:
    service:
      type: ClusterIP
      annotations:
        # Enable container-native load balancing so the GKE Ingress
        # routes directly to pods via NEG instead of through kube-proxy.
        cloud.google.com/neg: '{"ingress": true}'
        # Attach our BackendConfig so the GCLB uses our long timeout
        # and the JupyterHub-specific health check path.
        cloud.google.com/backend-config: '{"default": "jupyterhub-backend"}'
debug:
  enabled: true
