# Reference: https://raslasarslas.medium.com/how-to-deploy-sentry-on-a-kubernetes-cluster-using-helm-600db31d4486
# Sentry chart: https://github.com/sentry-kubernetes/charts
sentry:
  existingSecret: sentry-secret
  existingSecretKey: session-secret

  redis:
    enabled: true
    image:
      repository: bitnamilegacy/redis
    master:
      # Master had no resource spec (BestEffort QoS), making it a first
      # eviction candidate under node memory pressure. RDB snapshots are
      # ~2.6Gi so the limit needs headroom above steady state.
      resources:
        requests:
          cpu: 1
          memory: 3Gi
        limits:
          cpu: 2
          memory: 5Gi
    replica:
      replicaCount: 1
      # Default probes ping BOTH local AND master via
      # ping_liveness_local_and_master.sh, so the replica kills itself
      # whenever master briefly blips. Each kill triggers a full RDB resync
      # (~30s) during which sentry-relay can't read project state and
      # returns 502s. Override to check local only.
      customLivenessProbe:
        exec:
          command:
            - sh
            - -c
            - /health/ping_liveness_local.sh 5
        initialDelaySeconds: 20
        periodSeconds: 5
        timeoutSeconds: 6
        failureThreshold: 5
        successThreshold: 1
      customReadinessProbe:
        exec:
          command:
            - sh
            - -c
            - /health/ping_readiness_local.sh 1
        initialDelaySeconds: 20
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 5
        successThreshold: 1
      resources:
        requests:
          cpu: 1
          memory: 3Gi
        limits:
          cpu: 2
          memory: 5Gi

  postgresql:
    enabled: true
    image:
      repository: bitnamilegacy/postgresql
    global:
      postgresql:
        auth:
          existingSecret: sentry-sentry-postgresql
          adminPasswordKey: postgresql-password
          userPasswordKey: postgresql-password
    resources:
      requests:
        memory: 3Gi
    persistence:
      size: 100Gi

  user:
    create: true
    email: general+cal-itp@jarv.us
    existingSecret: sentry-secret
    existingSecretKey: admin-password
  nginx:
    enabled: false
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: nginx
      kubernetes.io/ingress.allow-http: "false"
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hostname: sentry.calitp.org
    additionalHostNames:
      - sentry.k8s.calitp.jarv.us
    tls:
      - secretName: metabase-tls
        hosts:
          - sentry.calitp.org
          - sentry.k8s.calitp.jarv.us

  # mail and slack use the same existingSecret as github but we use the default/only keys

  mail:
    backend: smtp
    useTls: true
    username: "PM-T-outbound-FUA5Xw3iImqk9PVLER6dkt"
    port: 587
    host: "smtp.postmarkapp.com"
    from: "bot@calitp.org"
    existingSecret: sentry-secret

  slack:
    existingSecret: sentry-secret

  # https://develop.sentry.dev/self-hosted/sso/#update-your-configuration-with-your-github-app-information
  # namespace these keys since the defaults overlap with slack
  github:
    appId: 288470
    appName: 'cal-itp-sentry'
    existingSecret: sentry-secret
    existingSecretPrivateKeyKey: "github-private-key"
    existingSecretWebhookSecretKey: "github-webhook-secret"
    existingSecretClientIdKey: "github-client-id"
    existingSecretClientSecretKey: "github-client-secret"

  sentry:
    web:
      resources:
        requests:
          memory: 1Gi
    worker:
      resources:
        requests:
          memory: 1Gi
    ingestConsumer:
      replicas: 2
    cleanup:
      activeDeadlineSeconds: 600
      days: 30
    postProcessForwardTransactions:
      replicas: 2
    existingSecret: sentry-sentry-secret

  snuba:
    subscriptionConsumerTransactions:
      replicas: 3
    subscriptionConsumerEvents:
      replicas: 2

  zookeeper:
    enabled: true
    image:
      repository: bitnamilegacy/zookeeper
      tag: 3.8.0-debian-11-r9
    persistence:
      size: 32Gi
    autopurge:
      snapRetainCount: 10
      purgeInterval: 1

  kafka:
    enabled: true
    image:
      repository: bitnamilegacy/kafka
    logRetentionHours: 72 # 3 days, the default is 7
    numPartitions: 12
    # Tolerate long log recovery after unclean shutdowns. Without this,
    # the liveness probe (~40s budget) kills kafka mid-recovery, producing
    # more unflushed segments and a death spiral. The startupProbe runs
    # only during startup; once it succeeds, liveness takes over with
    # normal timing. Gives ~20min startup window before liveness kicks in.
    startupProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 120
    kraft:
      enabled: false
    zookeeper:
      enabled: true
      image:
        repository: bitnamilegacy/zookeeper

  clickhouse:
    clickhouse:
      persistentVolumeClaim:
        dataPersistentVolume:
          # NOTE: volumeClaimTemplates in StatefulSets are immutable.
          # The actual PVCs have been manually expanded to 200Gi,
          # but this value must match the original StatefulSet template.
          storage: "50Gi"

  hooks:
    activeDeadlineSeconds: 1200
  rabbitmq:
      enabled: true
      image:
        repository: bitnamilegacy/rabbitmq
