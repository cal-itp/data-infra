operator: operators.ExternalTable
bucket: "{{ env_var('CALITP_BUCKET__ENGHOUSE_PARSED') }}"
source_objects:
  - "pw/*/*.jsonl.gz"
destination_project_dataset_table: "external_enghouse.pay_windows"
source_format: NEWLINE_DELIMITED_JSON
use_bq_client: true
hive_options:
  mode: CUSTOM
  require_partition_filter: false
  source_uri_prefix: "pw/{agency:STRING}/dt={dt:DATE}/"
schema_fields:
  - name: id
    type: STRING
  - name: token
    type: STRING
  - name: amount_settled
    type: STRING
  - name: amount_to_settle
    type: STRING
  - name: debt_settled
    type: STRING
  - name: stage
    type: STRING
  - name: payment_reference
    type: STRING
  - name: terminal_id
    type: STRING
  - name: open_date
    type: STRING
  - name: close_date
    type: STRING
  - name: operator_id
    type: STRING
  - name: _line_number
    type: STRING
