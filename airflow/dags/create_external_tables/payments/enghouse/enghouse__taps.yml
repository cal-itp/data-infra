operator: operators.ExternalTable
bucket: "{{ env_var('CALITP_BUCKET__ENGHOUSE_PARSED') }}"
source_objects:
  - "tap/*/*.jsonl.gz"
destination_project_dataset_table: "external_enghouse.taps"
source_format: NEWLINE_DELIMITED_JSON
use_bq_client: true
hive_options:
  mode: CUSTOM
  require_partition_filter: false
  source_uri_prefix: "tap/{agency:STRING}/dt={dt:DATE}/"
schema_fields:
  - name: tap_id
    type: STRING
  - name: mapping_terminal_id
    type: STRING
  - name: mapping_merchant_id
    type: STRING
  - name: terminal
    type: STRING
  - name: token
    type: STRING
  - name: masked_pan
    type: STRING
  - name: expiry
    type: STRING
  - name: server_date
    type: STRING
  - name: terminal_date
    type: STRING
  - name: tx_number
    type: STRING
  - name: tx_status
    type: STRING
  - name: payment_reference
    type: STRING
  - name: operator_id
    type: STRING
  - name: terminal_spdh_code
    type: STRING
  - name: denylist_version
    type: STRING
  - name: transit_data
    type: STRING
  - name: currency
    type: STRING
  - name: par
    type: STRING
  - name: fare_mode
    type: STRING
  - name: fare_type
    type: STRING
  - name: fare_value
    type: STRING
  - name: fare_description
    type: STRING
  - name: fare_linked_id
    type: STRING
  - name: gps_longitude
    type: STRING
  - name: gps_latitude
    type: STRING
  - name: gps_altitude
    type: STRING
  - name: vehicle_public_number
    type: STRING
  - name: vehicle_name
    type: STRING
  - name: stop_id
    type: STRING
  - name: stop_name
    type: STRING
  - name: platform_id
    type: STRING
  - name: platform_name
    type: STRING
  - name: zone_id
    type: STRING
  - name: zone_name
    type: STRING
  - name: line_public_number
    type: STRING
  - name: line_name
    type: STRING
  - name: line_direction
    type: STRING
  - name: trip_public_number
    type: STRING
  - name: trip_name
    type: STRING
  - name: service_public_number
    type: STRING
  - name: service_name
    type: STRING
  - name: driver_id
    type: STRING
  - name: _line_number
    type: STRING
