operator: operators.ExternalTable
bucket: "{{ env_var('CALITP_BUCKET__ENGHOUSE_PARSED') }}"
source_objects:
  - "tr/*.jsonl.gz"
destination_project_dataset_table: "external_enghouse.ticket_results"
source_format: NEWLINE_DELIMITED_JSON
use_bq_client: true
hive_options:
  mode: CUSTOM
  require_partition_filter: false
  source_uri_prefix: "tr/{agency:STRING}/{dt:DATE}/"
schema_fields:
  - name: id
    type: STRING
  - name: ticket_id
    type: STRING
  - name: station_name
    type: STRING
  - name: amount
    type: STRING
  - name: clearing_id
    type: STRING
  - name: operator_id
    type: STRING
  - name: reason
    type: STRING
  - name: tap_id
    type: STRING
  - name: ticket_type
    type: STRING
  - name: created_dttm
    type: STRING
  - name: line
    type: STRING
  - name: start_station
    type: STRING
  - name: end_station
    type: STRING
  - name: start_dttm
    type: STRING
  - name: end_dttm
    type: STRING
  - name: ticket_code
    type: STRING
  - name: additional_infos
    type: STRING
  - name: _line_number
    type: STRING
