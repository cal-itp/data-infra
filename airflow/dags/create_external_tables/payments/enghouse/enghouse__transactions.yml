operator: operators.ExternalTable
bucket: "{{ env_var('CALITP_BUCKET__ENGHOUSE_PARSED') }}"
source_objects:
  - "tx/*/*.jsonl.gz"
destination_project_dataset_table: "external_enghouse.transactions"
source_format: NEWLINE_DELIMITED_JSON
use_bq_client: true
hive_options:
  mode: CUSTOM
  require_partition_filter: false
  source_uri_prefix: "tx/{agency:STRING}/dt={dt:DATE}/"
schema_fields:
  - name: id
    type: STRING
  - name: operation
    type: STRING
  - name: terminal_id
    type: STRING
  - name: mapping_terminal_id
    type: STRING
  - name: mapping_merchant_id
    type: STRING
  - name: timestamp
    type: STRING
  - name: amount
    type: STRING
  - name: payment_reference
    type: STRING
  - name: spdh_response
    type: STRING
  - name: response_type
    type: STRING
  - name: response_message
    type: STRING
  - name: token
    type: STRING
  - name: issuer_response
    type: STRING
  - name: core_response
    type: STRING
  - name: rrn
    type: STRING
  - name: authorization_code
    type: STRING
  - name: par
    type: STRING
  - name: brand
    type: STRING
  - name: operatorid
    type: STRING
  - name: _line_number
    type: STRING
