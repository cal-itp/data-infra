operator: operators.ExternalTable
bucket: "{{ env_var('CALITP_BUCKET__TIDES_PUBLISH') }}"
source_objects:
  - "validation_outcomes/vehicle_locations/*.jsonl.gz"
destination_project_dataset_table: "external_tides.vehicle_locations_validation_outcomes"
source_format: NEWLINE_DELIMITED_JSON
use_bq_client: true
hive_options:
  mode: CUSTOM
  require_partition_filter: false
  source_uri_prefix: "validation_outcomes/vehicle_locations/{dt:DATE}/{ts:TIMESTAMP}/{base64_url:STRING}/"
schema_fields:
  - name: success
    type: BOOLEAN
  - name: exception
    type: STRING
    mode: NULLABLE
  - name: step
    type: STRING
  - name: process_stderr
    type: STRING
    mode: NULLABLE
  - name: blob_path
    type: STRING
    mode: NULLABLE
  - name: extract
    type: RECORD
    fields:
      - name: filename
        type: STRING
      - name: ts
        type: TIMESTAMP
      - name: config
        type: RECORD
        fields:
          &config_fields
          - name: extracted_at
            type: TIMESTAMP
          - name: name
            type: STRING
          - name: url
            type: STRING
          - name: feed_type
            type: STRING
          - name: schedule_url_for_validation
            type: STRING
            mode: NULLABLE
          - name: auth_query_params
            type: JSON
          - name: auth_headers
            type: JSON
          - name: computed
            type: BOOLEAN
          - name: tides_schema_url
            type: STRING
          - name: service_date
            type: DATE
          - name: gtfs_dataset_key
            type: STRING
          - name: warehouse_table
            type: STRING
      - name: response_code
        type: INT64
        mode: NULLABLE
      - name: response_headers
        type: JSON
        mode: NULLABLE
  - name: header
    type: RECORD
    fields:
      - name: row_count
        type: INT64
      - name: feed_count
        type: INT64
      - name: first_event_timestamp
        type: TIMESTAMP
        mode: NULLABLE
      - name: last_event_timestamp
        type: TIMESTAMP
        mode: NULLABLE
      - name: frictionless_valid
        type: BOOLEAN
      - name: error_counts_by_type
        type: JSON
  - name: aggregation
    type: RECORD
    fields:
      - name: filename
        type: STRING
      - name: step
        type: STRING
      - name: first_extract
        type: RECORD
        fields:
          - name: filename
            type: STRING
          - name: ts
            type: TIMESTAMP
          - name: config
            type: RECORD
            fields:
              *config_fields
          - name: response_code
            type: INT64
            mode: NULLABLE
          - name: response_headers
            type: JSON
            mode: NULLABLE
