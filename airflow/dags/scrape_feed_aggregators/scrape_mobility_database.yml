operator: operators.PodOperator
name: 'scrape-mobility-database'
image: 'ghcr.io/cal-itp/data-infra/gtfs-aggregator-scraper:{{ image_tag() }}'

cmds:
  - python3

arguments:
  - "gtfs_aggregator_scraper.py"
  - "mobility_database"

is_delete_operator_pod: true
get_logs: true
service_account_name: composer-service-account

env_vars:
  CALITP_BUCKET__AGGREGATOR_SCRAPER: "{{ env_var('CALITP_BUCKET__AGGREGATOR_SCRAPER') }}"

tolerations:
  - key: pod-role
    operator: Equal
    value: computetask
    effect: NoSchedule

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: pod-role
          operator: In
          values:
          - computetask
