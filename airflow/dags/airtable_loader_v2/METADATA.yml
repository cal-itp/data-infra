description: "Load data from Airtable"
schedule_interval: "0 2 * * *"
tags:
  - airtable
catchup: False
default_args:
    owner: airflow
    depends_on_past: False
    start_date: "2025-06-01"
    email_on_failure: True
    email_on_retry: False
    retries: 1
    retry_delay: !timedelta 'minutes: 2'
    pool: airtable_pool
    concurrency: 50
    #sla: !timedelta 'hours: 2'
wait_for_defaults:
    timeout: 3600
latest_only: True
