name: Build and publish docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  pull_request:
    paths:
      - 'docs/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  build-docs:
    name: Build docs
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache Python packages
      uses: actions/cache@v3
      with:
        path: ~/.local
        key: python-cache-${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-${{ hashFiles('.github/workflows/*.yml') }}

    - name: Install requirements
      working-directory: docs
      run: pip install -r requirements.txt

    - name: Authenticate Google Service Account
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Setup GCloud utilities
      uses: google-github-actions/setup-gcloud@v2

    - name: Build jupyter book
      run: jb build docs --warningiserror --keep-going # set doc to fail on any sphinx warning

    - name: Archive docs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: docs-build
        path: docs/_build/html

    - name: Deploy docs to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: ${{ github.ref == 'refs/heads/main' }}
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: docs/_build/html
        publish_branch: gh-pages

    - name: Deploy docs preview to Netlify
      if: ${{ github.ref != 'refs/heads/main' }}
      run: |
        npm install -g netlify-cli
        netlify deploy --dir=docs/_build/html --alias=docs-${GITHUB_REPOSITORY#*/}-${PR_NUMBER}
      env:
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        PR_NUMBER: ${{ github.event.number }}

    - name: Find comment
      uses: peter-evans/find-comment@v2
      if: ${{ github.event_name == 'pull_request' }}
      id: fc
      with:
        issue-number: ${{ github.event.number }}
        comment-author: 'github-actions[bot]'
        body-includes: --cal-itp-previews.netlify.app

    - name: Add preview URL to a comment
      uses: peter-evans/create-or-update-comment@v2
      if: ${{ github.event_name == 'pull_request' }}
      with:
        comment-id: ${{ steps.fc.outputs.comment-id }}
        issue-number: ${{ github.event.number }}
        body: "Preview url: https://docs-${{github.event.repository.name}}-${{ github.event.number }}--cal-itp-previews.netlify.app"
        edit-mode: replace
