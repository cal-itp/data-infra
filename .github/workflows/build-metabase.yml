name: Metabase Docker image

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-metabase.yml'
      - 'services/metabase/**'
      - 'iac/cal-itp-data-infra-staging/metabase/**'
      - 'iac/cal-itp-data-infra/metabase/**'
  pull_request:
    paths:
      - '.github/workflows/build-metabase.yml'
      - 'services/metabase/**'
      - 'iac/cal-itp-data-infra-staging/metabase/**'
      - 'iac/cal-itp-data-infra/metabase/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-metabase-staging
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Repository
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: services/metabase
          file: services/metabase/Dockerfile
          # Build-only on PRs: the mutable :staging/:production tags are what live
          # Cloud Run services re-resolve on redeploy, so they must only ever be
          # published from reviewed code on main.
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository }}/metabase:staging
            ghcr.io/${{ github.repository }}/metabase:production
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/metabase:staging
          cache-to: type=inline
