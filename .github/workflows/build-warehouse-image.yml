name: Build dbt image

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-warehouse-image.yml'
      - 'warehouse/**'
  pull_request:
    paths:
      - '.github/workflows/build-warehouse-image.yml'
      - 'warehouse/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          working-directory: warehouse
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-python: true

      - name: Install the project
        working-directory: warehouse
        run: uv sync --locked --all-extras --dev

      - name: Run mypy
        working-directory: warehouse
        run: uv run mypy scripts

  docker:
    name: Push docker image
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Repository
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: warehouse
          push: true
          tags: ghcr.io/${{ github.repository }}/warehouse:${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'latest' || 'development' }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/warehouse:${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'latest' || 'development' }}
          cache-to: type=inline
