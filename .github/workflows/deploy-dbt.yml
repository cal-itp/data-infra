name: Deploy dbt

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-dbt.yml
      - 'warehouse/**'
  pull_request:
    paths:
      - .github/workflows/deploy-dbt.yml
      - 'warehouse/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: '3.11'
  SERVICE_ACCOUNT: ${{ github.ref == 'refs/heads/main' && 'github-actions-service-account@cal-itp-data-infra.iam.gserviceaccount.com' || 'github-actions-service-account@cal-itp-data-infra-staging.iam.gserviceaccount.com' }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ github.ref == 'refs/heads/main' && 'projects/1005246706141/locations/global/workloadIdentityPools/github-actions/providers/data-infra' || 'projects/473674835135/locations/global/workloadIdentityPools/github-actions/providers/data-infra' }}
  PROJECT_ID: ${{ github.ref == 'refs/heads/main' && 'cal-itp-data-infra' || 'cal-itp-data-infra-staging' }}
  DBT_TARGET: ${{ github.ref == 'refs/heads/main' && 'prod' || 'staging' }}
  DBT_DOCS_BUCKET: ${{ github.ref == 'refs/heads/main' && 'calitp-dbt-docs' || 'calitp-staging-dbt-docs' }}
  CALITP_BUCKET__PUBLISH: ${{ github.ref == 'refs/heads/main' && 'calitp-publish' || 'calitp-staging-publish' }}
  GOOGLE_CLOUD_PROJECT: ${{ github.ref == 'refs/heads/main' && 'cal-itp-data-infra' || 'cal-itp-data-infra-staging' }}
  METABASE_DESTINATION_DATABASE: ${{ github.ref == 'refs/heads/main' && 'Data Marts (formerly Warehouse Views)' || '(Internal) Staging Warehouse Views' }}
  METABASE_URL: ${{ github.ref == 'refs/heads/main' && 'https://metabase.dds.dot.ca.gov' || 'https://metabase-staging.dds.dot.ca.gov' }}
  METABASE_API_KEY: ${{ github.ref == 'refs/heads/main' && secrets.METABASE_API_KEY || secrets.METABASE_STAGING_API_KEY }}
  DBT_DOCS_URL: ${{ github.ref == 'refs/heads/main' && 'https://dbt-docs.dds.dot.ca.gov' || 'https://dbt-docs-staging.dds.dot.ca.gov' }}

jobs:
  compile:
    name: Compile dbt
    runs-on: ubuntu-latest
    needs: [dbt-changed]

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate Google Service Account
        uses: google-github-actions/auth@v2
        with:
          create_credentials_file: 'true'
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Setup GCloud utilities
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          working-directory: warehouse
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-python: true

      - name: Install the project
        working-directory: warehouse
        run: uv sync --locked --all-extras --dev

      - name: Install dbt dependencies
        working-directory: warehouse
        run: uv run dbt deps

      - name: Print dbt environment
        working-directory: warehouse
        run: uv run dbt debug --target ${{ env.DBT_TARGET }}

      - name: List changed and downstream models
        if: ${{ needs.dbt-changed.outputs.has-changed == 'true' }}
        working-directory: warehouse
        run: uv run dbt list --select "${{ needs.dbt-changed.outputs.changed-downstream }}" --target ${{ env.DBT_TARGET }} --resource-type=model

      - name: Run seeds
        if: ${{ needs.dbt-changed.outputs.has-changed-seeds == 'true' }}
        working-directory: warehouse
        run: uv run dbt seed --select "${{ needs.dbt-changed.outputs.changed-seeds }}" --target ${{ env.DBT_TARGET }}

      - name: Full-Refresh changed models
        if: ${{ needs.dbt-changed.outputs.has-changed == 'true' }}
        working-directory: warehouse
        run: uv run dbt run --select "${{ needs.dbt-changed.outputs.changed-models }}" --target ${{ env.DBT_TARGET }} --full-refresh

      - name: Run downstream models
        if: ${{ needs.dbt-changed.outputs.has-changed == 'true' }}
        working-directory: warehouse
        run: uv run dbt run --select "${{ needs.dbt-changed.outputs.changed-downstream }}" --target ${{ env.DBT_TARGET }} --exclude "${{ needs.dbt-changed.outputs.changed-models }}"

      - name: Compile dbt
        working-directory: warehouse
        run: uv run dbt compile --target ${{ env.DBT_TARGET }}

      - name: Generate dbt documentation
        working-directory: warehouse
        run: uv run dbt docs generate --target ${{ env.DBT_TARGET }} --no-compile

      - name: Archive compilation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dbt
          path: |
            warehouse/target/*.html
            warehouse/target/*.json
            warehouse/target/*.msgpack

  dbt-changed:
    name: Detect dbt model and seed changes
    runs-on: ubuntu-latest

    outputs:
      has-changed: ${{ steps.changed-downstream.outputs.any_changed }}
      has-changed-seeds: ${{ steps.changed-seeds.outputs.any_changed }}
      changed-models: ${{ steps.changed-models.outputs.all_changed_files }}
      changed-seeds: ${{ steps.changed-seeds.outputs.all_changed_files }}
      changed-downstream: "${{ steps.changed-downstream.outputs.all_changed_files }}+"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: List changed models
        uses: tj-actions/changed-files@v46
        id: changed-models
        with:
          path: warehouse
          files: models/**/*.sql

      - name: List changed seeds
        uses: tj-actions/changed-files@v46
        id: changed-seeds
        with:
          path: warehouse
          files: seeds/*.csv

      - name: List changed models and seeds with plus sign
        uses: tj-actions/changed-files@v46
        id: changed-downstream
        with:
          path: warehouse
          separator: "+ "
          files: |
            models/**/*.sql
            seeds/*.csv

      - name: Print changed files
        if: ${{ steps.changed-downstream.outputs.any_changed == 'true' }}
        env:
          CHANGED_FILES: "${{ steps.changed-downstream.outputs.all_changed_files }}+"
        run: |
          echo "List changed files: $CHANGED_FILES"

  metabase:
    name: Sync Metabase
    runs-on: ubuntu-latest
    needs: [dbt-changed, compile]

    if: ${{ needs.dbt-changed.outputs.has-changed == 'true' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download compilation artifacts
        uses: actions/download-artifact@v4
        with:
          name: dbt
          path: warehouse/target

      - name: Authenticate Google Service Account
        uses: google-github-actions/auth@v2
        with:
          create_credentials_file: 'true'
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Setup GCloud utilities
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-python: true
          working-directory: warehouse
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install the project
        working-directory: warehouse
        run: uv sync --locked --all-extras --dev

      - name: Install dbt dependencies
        working-directory: warehouse
        run: uv run dbt deps

      - name: Print dbt environment
        working-directory: warehouse
        run: uv run dbt debug --target ${{ env.DBT_TARGET }}

      - name: Discover Payments Metabase databases
        id: payments-databases
        run: |
          set -euo pipefail

          # Each agency has its own Metabase database connection named
          # "Payments - <Agency Name>" (per the create-metabase-dashboards
          # runbook). Column-level docs from dbt have to land on every one
          # of those connections, not just the central warehouse connection,
          # so this step enumerates them via the Metabase API.
          PAYMENTS_DBS=$(curl -fsS \
            -H "x-api-key: ${METABASE_API_KEY}" \
            "${METABASE_URL}/api/database" \
            | jq -r '.data[] | select(.name | startswith("Payments - ")) | .name')

          if [ -z "${PAYMENTS_DBS}" ]; then
            echo "No 'Payments - *' databases found. Will sync only the central database."
          else
            echo "Discovered Payments databases:"
            printf '  - %s\n' ${PAYMENTS_DBS}
          fi

          {
            echo "names<<EOF"
            echo "${PAYMENTS_DBS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Synchronize Metabase
        working-directory: warehouse
        env:
          PAYMENTS_DBS: ${{ steps.payments-databases.outputs.names }}
        run: |
          set -euo pipefail

          sync_metabase_metadata() {
            local db="$1"
            echo "::group::dbt-metabase sync — ${db}"
            uv run dbt-metabase models -v \
              --manifest-path=target/manifest.json \
              --skip-sources \
              --exclude-schemas=staging,payments \
              --docs-url="${DBT_DOCS_URL}" \
              --metabase-url="${METABASE_URL}" \
              --metabase-database="${db}" \
              --metabase-api-key="${METABASE_API_KEY}"
            echo "::endgroup::"
          }

          failed=0

          # Central warehouse connection — preserves prior behavior.
          if ! sync_metabase_metadata "${METABASE_DESTINATION_DATABASE}"; then
            failed=1
            echo "::warning::dbt-metabase sync failed for '${METABASE_DESTINATION_DATABASE}'"
          fi

          # Per-agency Payments connections — partial-tolerant so one agency
          # outage doesn't block the rest.
          if [ -n "${PAYMENTS_DBS}" ]; then
            while IFS= read -r db; do
              [ -z "${db}" ] && continue
              if ! sync_metabase_metadata "${db}"; then
                failed=1
                echo "::warning::dbt-metabase sync failed for '${db}'"
              fi
            done <<< "${PAYMENTS_DBS}"
          fi

          if [ "${failed}" -ne 0 ]; then
            echo "::error::One or more dbt-metabase syncs failed"
            exit 1
          fi

  upload_dbt_docs:
    name: Upload to dbt-docs site
    needs: [compile]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download compilation artifacts
        uses: actions/download-artifact@v4
        with:
          name: dbt
          path: warehouse/target

      - name: Authenticate Google Service Account
        uses: google-github-actions/auth@v2
        with:
          create_credentials_file: 'true'
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Setup GCloud utilities
        uses: google-github-actions/setup-gcloud@v2

      # Don't send run_results.json because DBT_DOCS_BUCKET is a public bucket
      - name: Upload catalog.json and manifest.json
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: './warehouse/target/'
          glob: '{catalog.json,manifest.json}'
          parent: false
          process_gcloudignore: false
          destination: ${{ env.DBT_DOCS_BUCKET }}
          headers: |-
            content-type: application/json

      - name: Upload index.html
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: './warehouse/target/'
          glob: 'index.html'
          parent: false
          process_gcloudignore: false
          destination: ${{ env.DBT_DOCS_BUCKET }}
          headers: |-
            content-type: text/html; charset=utf-8

      - name: Upload partial_parse.msgpack
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: './warehouse/target/'
          glob: 'partial_parse.msgpack'
          parent: false
          process_gcloudignore: false
          destination: ${{ env.DBT_DOCS_BUCKET }}
          headers: |-
            content-type: application/vnd.msgpack

  airflow-changes:
    name: Detect Airflow Terraform changes
    runs-on: ubuntu-latest
    needs: [upload_dbt_docs]

    outputs:
      staging: ${{ steps.staging-changes.outputs.all_changed_files }}
      production: ${{ steps.production-changes.outputs.all_changed_files }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Staging Changes
        uses: tj-actions/changed-files@v46
        id: staging-changes
        with:
          matrix: true
          dir_names: true
          files: 'iac/cal-itp-data-infra-staging/airflow/**/*.tf'

      - name: Production Changes
        uses: tj-actions/changed-files@v46
        id: production-changes
        with:
          matrix: true
          dir_names: true
          files: 'iac/cal-itp-data-infra/airflow/**/*.tf'

  plan-changes-airflow-staging:
    name: Staging Plan for Airflow Changes
    runs-on: ubuntu-latest
    needs: [airflow-changes]

    if: ${{ github.ref != 'refs/heads/main' && !contains(github.ref, 'refs/heads/staging') && (needs.airflow-changes.outputs.staging == '[]' || needs.airflow-changes.outputs.staging == '') }}

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: google-github-actions/auth@v2
        with:
          create_credentials_file: 'true'
          project_id: cal-itp-data-infra-staging
          workload_identity_provider: 'projects/473674835135/locations/global/workloadIdentityPools/github-actions/providers/data-infra'
          service_account: 'github-actions-terraform@cal-itp-data-infra-staging.iam.gserviceaccount.com'

      - name: Terraform Plan
        uses: dflook/terraform-plan@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          add_github_comment: changes-only
          path: iac/cal-itp-data-infra-staging/airflow/us

  plan-changes-airflow-production:
    name: Production Plan for Airflow Changes
    runs-on: ubuntu-latest
    needs: [airflow-changes]

    if: ${{ github.ref != 'refs/heads/main' && (needs.airflow-changes.outputs.production == '[]' || needs.airflow-changes.outputs.production == '') }}

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: google-github-actions/auth@v2
        with:
          create_credentials_file: 'true'
          project_id: cal-itp-data-infra
          workload_identity_provider: 'projects/1005246706141/locations/global/workloadIdentityPools/github-actions/providers/data-infra'
          service_account: 'github-actions-terraform@cal-itp-data-infra.iam.gserviceaccount.com'

      - name: Terraform Plan
        uses: dflook/terraform-plan@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          add_github_comment: changes-only
          path: iac/cal-itp-data-infra/airflow/us

  apply-changes-airflow-staging:
    name: Staging Apply Airflow Changes
    runs-on: ubuntu-latest
    needs: [airflow-changes]

    if: ${{ (github.ref == 'refs/heads/main' || contains(github.ref, 'refs/heads/staging')) && (needs.airflow-changes.outputs.staging == '[]' || needs.airflow-changes.outputs.staging == '') }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: google-github-actions/auth@v2
        with:
          create_credentials_file: 'true'
          project_id: cal-itp-data-infra-staging
          workload_identity_provider: 'projects/473674835135/locations/global/workloadIdentityPools/github-actions/providers/data-infra'
          service_account: 'github-actions-terraform@cal-itp-data-infra-staging.iam.gserviceaccount.com'

      - name: Terraform Apply
        uses: dflook/terraform-apply@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path: iac/cal-itp-data-infra-staging/airflow/us
          auto_approve: ${{ contains(github.ref, 'refs/heads/staging') }}

  apply-changes-airflow-production:
    name: Production Apply Airflow Changes
    runs-on: ubuntu-latest
    needs: [airflow-changes]

    if: ${{ github.ref == 'refs/heads/main' && (needs.airflow-changes.outputs.production == '[]' || needs.airflow-changes.outputs.production == '') }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: google-github-actions/auth@v2
        with:
          create_credentials_file: 'true'
          project_id: cal-itp-data-infra
          workload_identity_provider: 'projects/1005246706141/locations/global/workloadIdentityPools/github-actions/providers/data-infra'
          service_account: 'github-actions-terraform@cal-itp-data-infra.iam.gserviceaccount.com'

      - name: Terraform Apply
        uses: dflook/terraform-apply@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path: iac/cal-itp-data-infra/airflow/us
