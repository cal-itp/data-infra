version: 2

models:
  - name: fct_capital_expenditures_time_series
    description: |
      Total capital funds expended by type of capital asset
      (total, rolling stock, facilities, other).
      Grain is year-agency (ntd_id, legacy_ntd_id)-mode.
      https://www.transit.dot.gov/ntd/data-product/ts31-capital-expenditures-time-series-2
    columns:
      - name: key
        description: |
          Synthetic primary key constructed from `ntd_id`, `year`, `legacy_ntd_id`, and `mode`.
        data_tests:
          - not_null
          - unique
  - name: fct_operating_and_capital_funding_time_series
    description: |
      Operating and capital revenues applied
      by funding source (federal, state, local, and other).
      Grain is year-agency (ntd_id, legacy_ntd_id).
      https://www.transit.dot.gov/ntd/data-product/ts12-operating-funding-time-series-3
    columns:
      - name: key
        description: |
          Synthetic primary key constructed from `ntd_id`, `year`, and `legacy_ntd_id`.
        data_tests:
          - not_null
          - unique
  - name: fct_operating_and_capital_funding_time_series_summary_total
    description: |
      Summary of operating and capital revenues applied
      by funding source (total / national, federal, state, local, and other).
      https://www.transit.dot.gov/ntd/data-product/ts12-operating-funding-time-series-3
  - name: fct_operating_and_capital_funding_time_series_decommissioned_operatingfares
    description: |
      Add description
    columns:
      - name: key
        description: |
          Synthetic primary key constructed from `ntd_id`, `year`, and `legacy_ntd_id`.
        data_tests:
          - not_null
          - unique
  - name: fct_operating_and_capital_funding_time_series_decommissioned_operatingother
    description: |
      Add description
    columns:
      - name: key
        description: |
          Synthetic primary key constructed from `ntd_id`, `year`, and `legacy_ntd_id`.
        data_tests:
          - not_null
          - unique
  - name: fct_service_data_and_operating_expenses_time_series_by_mode
    description: |
      NTD annual time-series of service data and operating data statistics by
      mode and type of service.
      Grain is year-agency-mode-type_of_service.
      https://www.transit.dot.gov/ntd/data-product/ts22-service-data-and-operating-expenses-time-series-system-0
    columns:
      - name: key
        description: |
          Synthetic primary key constructed from `ntd_id`, `year`, `mode`, and `type_of_service`.
        data_tests:
          - not_null
          - unique
