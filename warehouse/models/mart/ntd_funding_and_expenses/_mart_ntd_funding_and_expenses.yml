version: 2

x-common-fields:
  - &tos
    name: type_of_service
    description: '{{ doc("ntd_type_of_service") }}'
  - &mode
    name: mode
    description: '{{ doc("ntd_mode") }}'
  - &uza_name
    name: uza_name
    description: '{{ doc("ntd_primary_uza_name") }}'
  - &uace_cd
    name: uace_cd
    description: '{{ doc("ntd_primary_uza_code") }}'
  - &reporter_type
    name: reporter_type
    description: '{{ doc("ntd_reporter_type") }}'
  - &legacy_ntd_id
    name: legacy_ntd_id
    description: '{{ doc("ntd_legacy_id") }}'
  - &agency
    name: agency
    description: '{{ doc("ntd_agency") }}'
  - &ntd_id
    name: ntd_id
    description: '{{ doc("ntd_id") }}'
  - &dt
    name: dt
    description: '{{ doc("ntd_extracting_date") }}'
  - &execution_ts
    name: execution_ts
    description: '{{ doc("ntd_execution_timestamp") }}'

models:
  - name: fct_capital_expenditures_time_series
    description: |
      Total capital funds expended by type of capital asset
      (total, rolling stock, facilities, other).
      Grain is year-agency (ntd_id, legacy_ntd_id)-mode.
      https://www.transit.dot.gov/ntd/data-product/ts31-capital-expenditures-time-series-2
    columns:
      - name: key
        description: |
          Synthetic primary key constructed from `ntd_id`, `year`, `legacy_ntd_id`, and `mode`.
        data_tests:
          - not_null
          - unique
      - *ntd_id
      - name: year
        description: '{{ doc("ntd_period_year") }}'
      - *legacy_ntd_id
      - *mode
      - <<: *mode
        name: mode_full_name
      - *tos
      - name: agency_status
        description: ''
      - name: census_year
        description: ''
      - name: last_report_year
        description: ''
      - *reporter_type
      - name: reporting_module
        description: '{{ doc("ntd_reporting_module") }}'
      - *uace_cd
      - name: uza_area_sq_miles
        description: '{{ doc("ntd_primary_uza_area_sq_miles") }}'
      - *uza_name
      - name: uza_population
        description: '{{ doc("ntd_primary_uza_population") }}'
      - name: total_capital_expenditures
        description: Total capital funds spent on rolling stock, facilities, and other.
      - name: rolling_stock_expenditures
        description: |
          Total capital funds spent on rolling stock
          (Revenue Vehicles, Service Vehicles).
      - name: facilities_expenditures
        description: |
          Total capital funds spent on facilities
          (Passenger Stations, Administration Buildings,
          Maintenance Buildings, Guideway).
      - name: other_expenditures
        description: |
          Total capital funds spent on Communication-Information Systems,
          Fare Revenue Collection Equipment, Other.
      - name: _2024_mode_status
      - name: source_agency
        description: '{{ doc("ntd_agency") }}'
      - name: source_city
        description: '{{ doc("ntd_city") }}'
      - name: source_state
        description: '{{ doc("ntd_state") }}'
  - name: fct_operating_and_capital_funding_time_series
    description: |
      Operating and capital revenues applied
      by funding source (federal, state, local, and other).
      Grain is year-agency (ntd_id, legacy_ntd_id).
      https://www.transit.dot.gov/ntd/data-product/ts12-operating-funding-time-series-3
    columns:
      - name: key
        description: |
          Synthetic primary key constructed from `ntd_id`, `year`, and `legacy_ntd_id`.
        data_tests:
          - not_null
          - unique
      - *ntd_id
      - name: year
        description: '{{ doc("ntd_period_year") }}' 
      - *legacy_ntd_id
      - *mode
      - <<: *mode
        name: mode_full_name
      - *tos
      - name: agency_status
        description: ''
      - name: census_year
        description: ''
      - name: last_report_year
        description: ''    
      - *reporter_type
      - name: reporting_module
        description: '{{ doc("ntd_reporting_module") }}'  
      - *uace_cd
      - name: uza_area_sq_miles
        description: '{{ doc("ntd_primary_uza_area_sq_miles") }}'  
      - *uza_name
      - name: uza_population
        description: '{{ doc("ntd_primary_uza_population") }}'  
      - name: operating_total
        description: Sum of operating funds from 
      - name: operating_federal
        description: |
          
      - name: operating_state
        description: |
          
      - name: operating_local
        description: |
      - name: operating_other
        description: |          
      - name: _2024_mode_status
      - name: source_agency
        description: '{{ doc("ntd_agency") }}' 
      - name: source_city
        description: '{{ doc("ntd_city") }}'
      - name: source_state
        description: '{{ doc("ntd_state") }}' 
  - name: fct_operating_and_capital_funding_time_series_summary_total
    description: |
      Summary of operating and capital revenues applied
      by funding source (total / national, federal, state, local, and other).
      https://www.transit.dot.gov/ntd/data-product/ts12-operating-funding-time-series-3
    columns:
      - name: year
        description: '{{ doc("ntd_period_year") }}'
      - name: national_operating
        description: |
          Sum of Federal Funding, State Funding, Local Funding, and
          Other Sources of Funds applied to operations.
      - name: national_capital
        description: |
          Sum of Capital Federal, State, Local Funding, and Other Sources of Funds.
      - name: national_total
        description: |
          Sum of national_operating and national_capital.
      - name: federal_operating
        description: Federal funding applied to operations.
      - name: federal_capital
        description: Federal funding applied to capital.
      - name: federal_total
        description: Sum of federal_operating and federal_capital.
      - name: state_operating
        description: State funding applied to operations.
      - name: state_capital
        description: State funding applied to capital.
      - name: state_total
        description: Sum of state_operating and state_capital.
      - name: local_operating
        description: |
          Local funding applied to operations.
          Includes Sources of Funds such as revenues from the general fund.
          Also includes dedicated taxes levied directly by transit agencies.
      - name: local_capital
        description: |
          Local funding applied to capital.
          Includes Sources of Funds such as revenues from the general fund.
          Also includes dedicated taxes levied directly by transit agencies.
      - name: local_total
        description: Sum of local_operating and local_capital.
      - name: other_operating
        description: |
          Fare revenues and other funds directly generated by the agency applied to
          operations, including:
          - Auxiliary Revenue (Advertising, Concessions, Other)
          - Park and Ride Revenue
          - Auxiliary Revenue (Advertising, Concessions, Other)
          - Non-Transportation Revenues
          - Other Transportation revenues (i.e. charter service revenue)
          - Revenue from Purchased Transportation Agreements with NTD and non-NTD Reporters
          - Other Directly Generated Funds
          - Other Funds (Reduced Reporters Only)
          - Revenues from Subsidy from Other Sectors of Operation
          - Contributed Services and Contra Amount
          - Donations (Reduced Reporters Only)
          - Contract Revenue (Reduced Reporters Only)
      - name: other_capital
        description: |
          Fare revenues and Other directly generated funds applied to
          capital, including:
          - Auxiliary Revenue (Advertising, Concessions, Other)
          - Park and Ride Revenue
          - Auxiliary Revenue (Advertising, Concessions, Other)
          - Non-Transportation Revenues
          - Other Transportation revenues (i.e. charter service revenue)
          - Revenue from Purchased Transportation Agreements with NTD and non-NTD Reporters
          - Other Directly Generated Funds
          - Other Funds (Reduced Reporters Only)
          - Revenues from Subsidy from Other Sectors of Operation
          - Contributed Services and Contra Amount
          - Donations (Reduced Reporters Only)
          - Contract Revenue (Reduced Reporters Only)
      - name: other_total
        description: Sum of other_operating and other_capital.
      - *dt
      - *execution_ts

  - name: fct_operating_and_capital_funding_time_series_decommissioned_operatingfares
    description: |
      TODO: deprecate DAG, stg, fct, column is no longer populated
    columns:
      - name: key
        description: |
          Synthetic primary key constructed from `ntd_id`, `year`, and `legacy_ntd_id`.
        data_tests:
          - not_null
          - unique
  - name: fct_operating_and_capital_funding_time_series_decommissioned_operatingother
    description: |
      TODO: deprecate DAG, stg, fct, column is no longer populated
    columns:
      - name: key
        description: |
          Synthetic primary key constructed from `ntd_id`, `year`, and `legacy_ntd_id`.
        data_tests:
          - not_null
          - unique
  - name: fct_service_data_and_operating_expenses_time_series_by_mode
    description: |
      NTD annual time-series of service data and operating data statistics by
      mode and type of service.
      Grain is year-agency-mode-type_of_service.
      https://www.transit.dot.gov/ntd/data-product/ts22-service-data-and-operating-expenses-time-series-system-0
    columns:
      - name: key
        description: |
          Synthetic primary key constructed from `ntd_id`, `year`, `mode`, and `type_of_service`.
        data_tests:
          - not_null
          - unique
      - *ntd_id
      - *mode
      - name: year
        description: '{{ doc("ntd_period_year") }}'
      - *tos
      - name: unlinked_passenger_trips
        description: '{{ doc("ntd_upt") }}'
      - name: vehicle_revenue_hours
        description: '{{ doc("ntd_vrh") }}'
      - name: vehicle_revenue_miles
        description: '{{ doc("ntd_vrm") }}'
      - name: vehicles_operated_in_maxiumum_service
        description: '{{ doc("ntd_voms") }}'
      - name: passenger_miles_traveled
        description: '{{ doc("ntd_passenger_miles") }}'
      - name: direction_route_miles
        description: '{{ doc("ntd_directional_route_miles") }}'
      - name: operating_expenses_vehicle_operations
        description: Operating costs related to vehicle operations.
      - name: operating_expenses_vehicle_maintenance
        description: Operating costs related to vehicle maintenance.
      - name: operating_expenses_nonvehicle_maintenance
        description: Operating costs related to non-vehicle maintenance.
      - name: operating_expenses_general_administration
        description: Operating costs related to general administration.
      - name: operating_expenses_total
        description: |
          Total operating expenses. The sum of operating costs related to:
          vehicle operations, vehicle maintenance,
          non-vehicle maintenance, and general administration.
      - name: fare_revenue
        description: Total fare revenues.
      - name: opex_per_vrh
        description: |
          Operating expenses per vehicle revenue hour.
          Total operating expenses / vehicle revenue hours.
          A normalized metric of cost-efficiency.
      - name: opex_per_vrm
        description: |
          Operating expenses per vehicle revenue mile.
          Total operating expenses / vehicle revenue miles.
          A normalized metric of cost-efficiency.
      - name: opex_per_upt
        description: '{{ doc("ntd_avg_cost_per_trip_fy") }}'
      - name: upt_per_vrh
        description: |
          Unlinked passenger trips per vehicle revenue hour.
          Unlinked passenger trips / vehicle revenue hours.
          A normalized metric of service-effectiveness.
      - name: upt_per_vrm
        description: |
          Unlinked passenger trips per vehicle revenue mile.
          Unlinked passenger trips / vehicle revenue miles.
          A normalized metric of service-effectiveness.
      - name: farebox_recovery_ratio
        description: |
          Farebox recovery ratio is the proportion of operating expenses
          covered by fare revenues. It combines cost-efficiency and service-effectiveness
          into a single metric.
          Fare revenues / operating_expenses_total.
      - name: agency_status
        description: ""
      - name: census_year
        description: ""
      - name: last_report_year
        description: ""
      - name: mode_status
        description: ""
      - *reporter_type
      - name: reporting_module
        description: '{{ doc("ntd_reporting_module") }}'
      - *uace_cd
      - name: uza_area_sq_miles
        description: '{{ doc("ntd_primary_uza_area_sq_miles") }}'
      - *uza_name
      - name: uza_population
        description: '{{ doc("ntd_primary_uza_population") }}'
      - name: source_agency
        description: '{{ doc("ntd_agency") }}'
      - name: source_city
        description: '{{ doc("ntd_city") }}'
      - name: source_state
        description: '{{ doc("ntd_state") }}'
      - name: upt_prior_year
        description: "Unlinked passenger trips from 1 year ago"
      - name: upt_change_1yr
        description: |
          Difference between current unlinked passenger trips and 1 year ago.
          (current_upt - prior_year_upt).
      - name: upt_pct_change_1yr
        description: |
          Percent change of the difference between current unlinked passenger trips and 1 year ago.
          (current_upt - prior_year_upt) / prior_year_upt.
      - name: mode_full_name
        description: '{{ doc("ntd_mode_name") }}'
      - name: type_of_service_full_name
        description: '{{ doc("ntd_type_of_service") }}'
      - name: service_type
        description: '{{ doc("ntd_ridership_service_type") }}'
      - *dt
      - *execution_ts
