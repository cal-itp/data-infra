version: 2

models:
  - name: fct_tides_vehicle_locations
    description: |
      Vehicle location pings reshaped to the TIDES (Transit Integrated Data
      Exchange Specification) `vehicle_locations` schema
      (https://tides-transit.org/main/). Sourced from `fct_vehicle_locations`
      and filtered via `dim_provider_gtfs_data` to public, customer-facing or
      regional-subfeed fixed-route feeds.
    meta:
      publish.product: tides
    columns:
      - name: location_ping_id
        description: |
          TIDES PK. Inherits `fct_vehicle_locations.key` (the upstream
          "almost unique" surrogate) with a defensive QUALIFY dedup
          applied here.
        data_tests:
          - not_null:
              arguments:
                config:
                  where: '__rt_sampled__'
          - unique_proportion:
              arguments:
                at_least: 0.999
                config:
                  where: '__rt_sampled__'
      - name: service_date
        description: |
          Attempt to identify the `service_date` (corresponding to the related
          schedule feed) for trip activity referenced in a GTFS RT feed.
      - name: event_timestamp
        description: |
          DATETIME in the agency's schedule feed timezone, derived from
          `fct_vehicle_locations.location_timestamp`.
        data_tests:
          - not_null:
              arguments:
                config:
                  where: '__rt_sampled__'
      - name: trip_id_performed
        description: |
          GTFS-RT trip_id. Upstream `fct_vehicle_locations` drops NULL
          trip_id rows.
      - name: trip_id_scheduled
        description: NULL in MVP; pending join to `fct_scheduled_trips`.
      - name: trip_stop_sequence
        description: |
          GTFS-RT current_stop_sequence, NULLed when 0 to satisfy TIDES
          minimum 1.
      - name: scheduled_stop_sequence
        description: NULL in MVP.
      - name: vehicle_id
        description: '{{ doc("gtfs_vehicle_descriptor__id") }}'
        data_tests:
          - not_null:
              arguments:
                config:
                  where: '__rt_sampled__'
      - name: device_id
        description: NULL; not derivable from GTFS-RT.
      - name: pattern_id
        description: NULL in MVP.
      - name: stop_id
        description: '{{ doc("gtfs_vehicle_position__stop_id") }}'
      - name: current_status
        description: |
          TIDES enum (Incoming at / Stopped at / In transit to), mapped
          from the GTFS-RT casing.
        data_tests:
          - accepted_values:
              arguments:
                values: ['Incoming at', 'Stopped at', 'In transit to']
                config:
                  where: '__rt_sampled__ AND current_status IS NOT NULL'
      - name: latitude
        description: WGS-84 degrees north; out-of-bounds values are NULLed.
      - name: longitude
        description: WGS-84 degrees east; out-of-bounds values are NULLed.
      - name: gps_quality
        description: NULL; not derivable from GTFS-RT.
      - name: heading
        description: Degrees clockwise from true north; out-of-range NULLed.
      - name: speed
        description: Meters per second; negatives NULLed.
      - name: odometer
        description: Meters; negatives NULLed.
      - name: schedule_deviation
        description: NULL in MVP.
      - name: headway_deviation
        description: NULL; requires multi-trip analysis.
      - name: trip_type
        description: |
          Coarse 'In service' / NULL. Effectively constant in MVP because
          upstream drops NULL trip_id rows; expression kept for future
          expansion to deadhead / layover / pull-in / pull-out.
        data_tests:
          - accepted_values:
              arguments:
                values: ['In service', 'Deadhead', 'Layover', 'Pullout', 'Pullin', 'Extra Pullout', 'Extra Pullin', 'Deadhead To Layover', 'Deadhead From Layover', 'Other not in service']
                config:
                  where: '__rt_sampled__ AND trip_type IS NOT NULL'
      - name: schedule_relationship
        description: |
          TIDES enum is stop-level (Scheduled / Skipped / Added / Missing);
          GTFS-RT is trip-level. NULL pending
          https://github.com/TIDES-transit/TIDES/issues/252.
      - name: dt
        description: |
          Date (UTC) on which this data was scraped. A value for this field
          must be provided when querying this model due to data size.
      - name: base64_url
        description: '{{ doc("column_base64_url") }}'
      - name: gtfs_dataset_key
        description: '{{ doc("gtfs_schedule_gtfs_dataset_key") }}'
      - name: organization_name
        description: |
          Canonical agency name from `dim_provider_gtfs_data` (lex-smallest
          when multiple agencies share a feed). Not part of TIDES; retained
          for per-agency export paths.
      - name: organization_ntd_id
        description: NTD ID for the canonical agency. Not part of TIDES.

  - name: fct_tides_trips_performed
    description: |
      Trips performed reshaped to the TIDES (Transit Integrated Data Exchange
      Specification) `trips_performed` schema (https://tides-transit.org/main/).
      Sourced from `fct_observed_trips`, joined to `fct_scheduled_trips` for
      route metadata and to `fct_tides_vehicle_locations` for canonical
      vehicle_id per trip. Filtered upstream to `appeared_in_vp = TRUE` so
      every row has a derivable vehicle_id.
    meta:
      publish.product: tides
    columns:
      - name: service_date
        description: TIDES PK (with trip_id_performed). From `fct_observed_trips.service_date`.
        data_tests:
          - not_null:
              arguments:
                config:
                  where: '__rt_sampled__'
      - name: trip_id_performed
        description: TIDES PK (with service_date). From `fct_observed_trips.trip_id`.
        data_tests:
          - not_null:
              arguments:
                config:
                  where: '__rt_sampled__'
      - name: vehicle_id
        description: |
          Most-frequent vehicle_id observed in `fct_tides_vehicle_locations`
          for the same (service_date, trip_id_performed). TIDES required.
        data_tests:
          - not_null:
              arguments:
                config:
                  where: '__rt_sampled__'
          - relationships:
              arguments:
                to: ref('fct_tides_vehicle_locations')
                field: vehicle_id
                config:
                  where: '__rt_sampled__'
      - name: trip_id_scheduled
        description: |
          Coarse MVP: equals trip_id_performed when the trip appeared in VP
          or TU. A stricter join to `fct_scheduled_trips` is a follow-up.
      - name: route_id
        description: From `fct_scheduled_trips` via trip_instance_key. NULL when no schedule.
      - name: route_type
        description: GTFS route_type. From `fct_scheduled_trips`.
      - name: ntd_mode
        description: NULL in MVP.
      - name: route_type_agency
        description: NULL in MVP.
      - name: shape_id
        description: From `fct_scheduled_trips`.
      - name: pattern_id
        description: NULL in MVP.
      - name: direction_id
        description: From `fct_scheduled_trips`.
      - name: operator_id
        description: NULL; not derivable from GTFS-RT.
      - name: block_id
        description: From `fct_scheduled_trips`.
      - name: trip_start_stop_id
        description: NULL in MVP; needs stop_times join on min stop_sequence.
      - name: trip_end_stop_id
        description: NULL in MVP; needs stop_times join on max stop_sequence.
      - name: schedule_trip_start
        description: |
          DATETIME in agency tz from `fct_scheduled_trips.trip_first_departure_ts`.
      - name: schedule_trip_end
        description: |
          DATETIME in agency tz from `fct_scheduled_trips.trip_last_arrival_ts`.
      - name: actual_trip_start
        description: DATETIME in agency tz from `fct_observed_trips.vp_min_ts`.
      - name: actual_trip_end
        description: DATETIME in agency tz from `fct_observed_trips.vp_max_ts`.
      - name: trip_type
        description: |
          Constant 'In service' in MVP because the model filters to VP-observed
          trips. Future expansion could distinguish deadhead / layover / pull-in
          / pull-out given supplemental signals.
        data_tests:
          - accepted_values:
              arguments:
                values: ['In service', 'Deadhead', 'Layover', 'Pullout', 'Pullin', 'Extra Pullout', 'Extra Pullin', 'Deadhead To Layover', 'Deadhead From Layover', 'Other not in service']
                config:
                  where: '__rt_sampled__ AND trip_type IS NOT NULL'
      - name: schedule_relationship
        description: |
          TIDES enum (Scheduled / Added / Unscheduled / Canceled / Duplicated)
          mapped from `fct_observed_trips.tu_starting_schedule_relationship`.
        data_tests:
          - accepted_values:
              arguments:
                values: ['Scheduled', 'Added', 'Unscheduled', 'Canceled', 'Duplicated']
                config:
                  where: '__rt_sampled__ AND schedule_relationship IS NOT NULL'
      - name: base64_url
        description: '{{ doc("column_base64_url") }}'
      - name: gtfs_dataset_key
        description: '{{ doc("gtfs_schedule_gtfs_dataset_key") }}'
      - name: organization_name
        description: |
          Canonical agency name (lex-smallest when multiple agencies share a
          feed). Not part of TIDES; retained for per-agency export paths.
      - name: organization_ntd_id
        description: NTD ID for the canonical agency. Not part of TIDES.
