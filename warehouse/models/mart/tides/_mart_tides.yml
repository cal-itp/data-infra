version: 2

models:
  - name: fct_tides_vehicle_locations
    description: |
      Vehicle location pings reshaped to the TIDES (Transit Integrated Data
      Exchange Specification) `vehicle_locations` schema
      (https://tides-transit.org/main/). Sourced from `fct_vehicle_locations`
      and filtered via `dim_provider_gtfs_data` to public, customer-facing or
      regional-subfeed fixed-route feeds.
    columns:
      - name: location_ping_id
        description: |
          TIDES PK. Inherits `fct_vehicle_locations.key` (the upstream
          "almost unique" surrogate) with a defensive QUALIFY dedup
          applied here.
        data_tests:
          - not_null:
              arguments:
                config:
                  where: '__rt_sampled__'
          - unique_proportion:
              arguments:
                at_least: 0.999
                config:
                  where: '__rt_sampled__'
      - name: service_date
        description: |
          Attempt to identify the `service_date` (corresponding to the related
          schedule feed) for trip activity referenced in a GTFS RT feed.
      - name: event_timestamp
        description: |
          DATETIME in the agency's schedule feed timezone, derived from
          `fct_vehicle_locations.location_timestamp`.
        data_tests:
          - not_null:
              arguments:
                config:
                  where: '__rt_sampled__'
      - name: trip_id_performed
        description: GTFS-RT trip_id.
      - name: trip_stop_sequence
        description: GTFS-RT current_stop_sequence.
      - name: vehicle_id
        description: '{{ doc("gtfs_vehicle_descriptor__id") }}'
        data_tests:
          - not_null:
              arguments:
                config:
                  where: '__rt_sampled__'
      - name: stop_id
        description: '{{ doc("gtfs_vehicle_position__stop_id") }}'
      - name: current_status
        description: TIDES enum (Incoming at / Stopped at / In transit to).
        data_tests:
          - accepted_values:
              arguments:
                values: ['Incoming at', 'Stopped at', 'In transit to']
                config:
                  where: '__rt_sampled__'
      - name: latitude
        description: WGS-84 degrees north; out-of-bounds values are NULLed.
      - name: longitude
        description: WGS-84 degrees east; out-of-bounds values are NULLed.
      - name: heading
        description: Degrees clockwise from true north; out-of-range NULLed.
      - name: speed
        description: Meters per second; negatives NULLed.
      - name: odometer
        description: Meters.
      - name: trip_type
        description: |
          Coarse 'In service' / NULL. Effectively constant in MVP because
          upstream drops NULL trip_id rows; expression kept for future
          expansion to deadhead / layover / pull-in / pull-out.
        data_tests:
          - accepted_values:
              arguments:
                values: ['In service', 'Deadhead', 'Layover', 'Pullout', 'Pullin', 'Extra Pullout', 'Extra Pullin', 'Deadhead To Layover', 'Deadhead From Layover', 'Other not in service']
                config:
                  where: '__rt_sampled__'
      - name: base64_url
        description: '{{ doc("column_base64_url") }}'
      - name: gtfs_dataset_key
        description: '{{ doc("gtfs_schedule_gtfs_dataset_key") }}'
      - name: organization_source_record_id
        description: |
          Persistent Airtable organization record ID, taken from the
          `dim_provider_gtfs_data` row in effect when the ping was scraped
          (the row whose `_valid_from`/`_valid_to` window covers the ping's
          extract timestamp). Internal — not a TIDES field; carried so
          `tides_publication_feeds` and the export DAG can key by organization.

  - name: fct_tides_trips_performed
    description: |
      Trips performed reshaped to the TIDES (Transit Integrated Data Exchange
      Specification) `trips_performed` schema (https://tides-transit.org/main/).
      Sourced from `fct_observed_trips`, joined to `fct_scheduled_trips` for
      route metadata and to `fct_tides_vehicle_locations` for canonical
      vehicle_id per trip. Filtered upstream to `appeared_in_vp = TRUE` so
      every row has a derivable vehicle_id.
    columns:
      - name: service_date
        description: TIDES PK (with trip_id_performed). From `fct_observed_trips.service_date`.
        data_tests:
          - not_null:
              arguments:
                config:
                  where: 'service_date >= DATE_SUB(CURRENT_DATE(), INTERVAL 2 DAY)'
      - name: trip_id_performed
        description: TIDES PK (with service_date). From `fct_observed_trips.trip_id`.
        data_tests:
          - not_null:
              arguments:
                config:
                  where: 'service_date >= DATE_SUB(CURRENT_DATE(), INTERVAL 2 DAY)'
      - name: vehicle_id
        description: |
          Most-frequent vehicle_id observed in `fct_tides_vehicle_locations`
          for the same (service_date, trip_id_performed). TIDES required.
        data_tests:
          - not_null:
              arguments:
                config:
                  where: 'service_date >= DATE_SUB(CURRENT_DATE(), INTERVAL 2 DAY)'
          - relationships:
              arguments:
                to: ref('fct_tides_vehicle_locations')
                field: vehicle_id
                config:
                  where: 'service_date >= DATE_SUB(CURRENT_DATE(), INTERVAL 2 DAY)'
      - name: trip_id_scheduled
        description: |
          Coarse MVP: equals trip_id_performed when the trip appeared in VP
          or TU. A stricter join to `fct_scheduled_trips` is a follow-up.
      - name: route_id
        description: From `fct_scheduled_trips` via trip_instance_key. NULL when no schedule.
      - name: route_type
        description: GTFS route_type. From `fct_scheduled_trips`.
      - name: shape_id
        description: From `fct_scheduled_trips`.
      - name: direction_id
        description: From `fct_scheduled_trips`.
      - name: block_id
        description: From `fct_scheduled_trips`.
      - name: schedule_trip_start
        description: |
          DATETIME in agency tz from `fct_scheduled_trips.trip_first_departure_ts`.
      - name: schedule_trip_end
        description: |
          DATETIME in agency tz from `fct_scheduled_trips.trip_last_arrival_ts`.
      - name: actual_trip_start
        description: DATETIME in agency tz from `fct_observed_trips.vp_min_ts`.
      - name: actual_trip_end
        description: DATETIME in agency tz from `fct_observed_trips.vp_max_ts`.
      - name: trip_type
        description: |
          Constant 'In service' in MVP because the model filters to VP-observed
          trips. Future expansion could distinguish deadhead / layover / pull-in
          / pull-out given supplemental signals.
        data_tests:
          - accepted_values:
              arguments:
                values: ['In service', 'Deadhead', 'Layover', 'Pullout', 'Pullin', 'Extra Pullout', 'Extra Pullin', 'Deadhead To Layover', 'Deadhead From Layover', 'Other not in service']
                config:
                  where: 'service_date >= DATE_SUB(CURRENT_DATE(), INTERVAL 2 DAY)'
      - name: schedule_relationship
        description: |
          TIDES enum (Scheduled / Added / Unscheduled / Canceled / Duplicated)
          mapped from `fct_observed_trips.tu_starting_schedule_relationship`.
        data_tests:
          - accepted_values:
              arguments:
                values: ['Scheduled', 'Added', 'Unscheduled', 'Canceled', 'Duplicated']
                config:
                  where: 'service_date >= DATE_SUB(CURRENT_DATE(), INTERVAL 2 DAY)'
      - name: base64_url
        description: '{{ doc("column_base64_url") }}'
      - name: gtfs_dataset_key
        description: '{{ doc("gtfs_schedule_gtfs_dataset_key") }}'
      - name: organization_source_record_id
        description: |
          Persistent Airtable organization record ID, taken from the
          `dim_provider_gtfs_data` row in effect when the ping was scraped
          (the row whose `_valid_from`/`_valid_to` window covers the ping's
          extract timestamp). Internal — not a TIDES field; carried so
          `tides_publication_feeds` and the export DAG can key by organization.

  - name: tides_publication_feeds
    description: |
      Day-by-day record of which vehicle-positions feed to publish for which
      organization on which service_date (Pacific Time) — one row per
      (service_date, organization, feed). The TIDES export DAG reads this filtered to a
      single `service_date` and fans out one parquet export per row, filtering
      `fct_tides_vehicle_locations` on `service_date` + `base64_url`. Because the record
      is per-day, a backfill of any past date uses the `base64_url` that was
      correct for that day. Internal to the publish flow; not a TIDES spec
      table.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - service_date
              - organization_source_record_id
              - gtfs_dataset_key
    columns:
      - name: service_date
        description: Date (Pacific Time) the vehicle-positions data was scraped.
        data_tests:
          - not_null
      - name: organization_source_record_id
        description: |
          Persistent Airtable organization record ID — the publication grain
          and the GCS export-path key.
        data_tests:
          - not_null
      - name: vehicle_positions_source_record_id
        description: |
          Persistent Airtable record ID of the vehicle-positions feed, from the
          current dim snapshot. NULL if the feed has no current dim row.
      - name: agency_name
        description: Human-readable organization name, from the current dim snapshot.
      - name: feed_name
        description: |
          Per-feed name (e.g. "LA Metro Rail Vehicle Positions"), used as the
          DAG's per-export label.
      - name: gtfs_dataset_key
        description: |
          Versioned key of the vehicle-positions feed; joins to
          `fct_tides_vehicle_locations.gtfs_dataset_key`.
      - name: base64_url
        description: |
          Base64-encoded feed URL observed for this feed on this `service_date`. The DAG
          filters `fct_tides_vehicle_locations` on `service_date` + `base64_url`.
        data_tests:
          - not_null

exposures:
  - name: california_tides
    type: application
    maturity: low
    url: https://tides-transit.org/main/
    description: California TIDES (Transit Integrated Data Exchange Specification) data published to a public GCS bucket.

    depends_on:
      - ref("fct_tides_vehicle_locations")
      - ref("fct_tides_trips_performed")

    owner:
      email: hello@calitp.org

    meta:
      methodology: |
        Cal-ITP reshapes GTFS-RT vehicle position and trip update messages into the
        open TIDES specification for analytics use. See https://tides-transit.org for the spec.
